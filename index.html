<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคำนวณค่าดัชนีมวลกาย (BMI Calculator)</title>
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #2c3e50; }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #34495e;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: background 0.3s;
        }
        button:hover { background-color: #2980b9; }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
            font-size: 18px;
        }
        .status-underweight { background-color: #f1c40f; color: #fff; }
        .status-normal { background-color: #2ecc71; color: #fff; }
        .status-overweight { background-color: #e67e22; color: #fff; }
        .status-obese1 { background-color: #e74c3c; color: #fff; }
        .status-obese2 { background-color: #c0392b; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h2>คำนวณดัชนีมวลกาย (BMI)</h2>
    <div class="input-group">
        <label for="weight">น้ำหนัก (กิโลกรัม):</label>
        <input type="number" id="weight" placeholder="เช่น 65" step="0.1">
    </div>
    <div class="input-group">
        <label for="height">ส่วนสูง (เซนติเมตร):</label>
        <input type="number" id="height" placeholder="เช่น 170" step="0.1">
    </div>
    <button onclick="calculateBMI()">คำนวณ BMI</button>

    <div id="resultBox" class="result">
        <div id="bmiValue" style="font-weight: bold; font-size: 24px;"></div>
        <div id="bmiMeaning" style="margin-top: 5px;"></div>
    </div>
</div>

<script>
    function calculateBMI() {
        const weight = parseFloat(document.getElementById('weight').value);
        const heightCm = parseFloat(document.getElementById('height').value);

        if (isNaN(weight) || isNaN(heightCm) || weight <= 0 || heightCm <= 0) {
            alert("กรุณากรอกข้อมูลน้ำหนักและส่วนสูงให้ถูกต้อง");
            return;
        }

        // แปลงส่วนสูงจากเซนติเมตรเป็นเมตร
        const heightM = heightCm / 100;
        
        // คำนวณ BMI
        const bmi = weight / (heightM * heightM);
        const bmiRounded = bmi.toFixed(2);

        let meaning = "";
        let statusClass = "";

        // แปลผลตามเกณฑ์เอเชีย/ไทย
        if (bmi < 18.5) {
            meaning = "น้ำหนักน้อย / ผอม";
            statusClass = "status-underweight";
        } else if (bmi >= 18.5 && bmi <= 22.9) {
            meaning = "ปกติ / สุขภาพดี";
            statusClass = "status-normal";
        } else if (bmi >= 23.0 && bmi <= 24.9) {
            meaning = "ท้วม / โรคอ้วนระดับ 1";
            statusClass = "status-overweight";
        } else if (bmi >= 25.0 && bmi <= 29.9) {
            meaning = "อ้วน / โรคอ้วนระดับ 2";
            statusClass = "status-obese1";
        } else {
            meaning = "อ้วนมาก / โรคอ้วนระดับ 3";
            statusClass = "status-obese2";
        }

        // แสดงผล
        const resultBox = document.getElementById('resultBox');
        resultBox.style.display = 'block';
        resultBox.className = 'result ' + statusClass;
        
        document.getElementById('bmiValue').innerText = "BMI: " + bmiRounded;
        document.getElementById('bmiMeaning').innerText = "ผลการประเมิน: " + meaning;
    }
</script>

</body>
</html>
